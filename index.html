<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shikaku</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="logo" href="index.html">Shikaku</a>
      <nav>
        <a href="how-to-play.html">How to Play</a>
        <a href="privacy.html">Privacy</a>
      </nav>
    </header>

    <main class="shell">
      <section id="home-screen" class="screen active" aria-labelledby="home-title">
        <div class="home-brand">
          <img
            class="home-brand-logo"
            src="derpy-donut-logo.png"
            alt="Derpy Donut logo"
            width="320"
            height="320"
          />
        </div>
        <h1 id="home-title">Play Shikaku</h1>
        <p class="lead">Partition the board into rectangles that match each clue number.</p>

        <div class="panel-grid">
          <section class="panel" aria-labelledby="difficulty-title">
            <h2 id="difficulty-title">Difficulty</h2>
            <div id="difficulty-options" class="option-grid"></div>
          </section>

          <section class="panel" aria-labelledby="size-title">
            <h2 id="size-title">Board Size</h2>
            <div id="size-options" class="option-grid"></div>
          </section>
        </div>

        <div class="action-row">
          <button id="select-level-btn" class="primary">Select Level</button>
          <button id="random-level-btn">Random Level</button>
          <button id="continue-btn" hidden>Continue</button>
        </div>
        <p id="home-note" class="note"></p>
      </section>

      <section id="levels-screen" class="screen" aria-labelledby="levels-title">
        <div class="levels-header">
          <h2 id="levels-title">Levels</h2>
          <div class="action-row compact">
            <button id="levels-back-btn">Back</button>
          </div>
        </div>
        <p id="levels-subtitle" class="lead"></p>
        <div id="levels-grid" class="levels-grid"></div>
      </section>

      <section id="puzzle-screen" class="screen" aria-labelledby="puzzle-title">
        <div class="puzzle-topbar">
          <h2 id="puzzle-title">Puzzle</h2>
          <div class="metadata">
            <span id="meta-difficulty">-</span>
            <span id="meta-size">-</span>
            <span id="meta-level">-</span>
            <span id="timer-display" class="timer">00:00.000</span>
          </div>
        </div>

        <div class="action-row wrap">
          <button id="undo-btn">Undo</button>
          <button id="redo-btn">Redo</button>
          <button id="pause-btn">Pause</button>
          <button id="erase-btn">Erase</button>
          <button id="clear-btn">Clear All</button>
          <button id="restart-btn">Restart</button>
          <button id="to-levels-btn">Back to Levels</button>
          <a class="inline-link" href="how-to-play.html">How to Play</a>
        </div>

        <p id="puzzle-note" class="note"></p>

        <div id="board-wrap" class="board-wrap locked" aria-live="polite">
          <div id="board" class="board" role="grid" aria-label="Shikaku puzzle board"></div>
          <div id="drag-size-indicator" class="drag-size-indicator" hidden></div>
          <button id="board-overlay" class="lock-overlay" type="button">Press here to begin</button>
        </div>
      </section>
    </main>

    <dialog id="solved-modal">
      <h2>Solved!</h2>
      <p id="solved-time">Time: 00:00.000</p>
      <p id="solved-best">Best: -</p>
      <div class="action-row wrap">
        <button id="next-level-btn" class="primary">Next Level</button>
        <button id="replay-btn">Replay</button>
        <button id="modal-levels-btn">Back to Levels</button>
      </div>
    </dialog>

    <div id="toast-root" class="toast-root" aria-live="assertive" aria-atomic="true"></div>

    <footer class="site-footer">
      <a href="https://github.com/" target="_blank" rel="noreferrer">Report a Problem</a>
    </footer>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
